<html lang="en">
<head>
<meta charset="UTF-8"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07071a;
  --surface:#0f0e2a;
  --surface2:#181636;
  --border:#2a2750;
  --accent:#6366f1;
  --accent2:#a78bfa;
  --accent3:#38bdf8;
  --green:#22d3a5;
  --red:#f87171;
  --gold:#f59e0b;
  --text:#e8e6ff;
  --muted:#7c78a8;
  --dim:#3d3a6e;
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --ease-out:cubic-bezier(.22,1,.36,1);
  --ease-in-out:cubic-bezier(.65,0,.35,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  background-image:
    radial-gradient(ellipse 80% 50% at 70% -10%,rgba(99,102,241,.09) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 90%,rgba(167,139,250,.06) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 90% 60%,rgba(56,189,248,.04) 0%,transparent 50%);
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,.4);border-radius:99px}

/* ── Base inputs ── */
input,textarea,select{
  font-family:inherit;
  transition:border-color .25s var(--ease-out),box-shadow .25s var(--ease-out),background .25s;
}
input:focus,textarea:focus,select:focus{
  outline:none;
  border-color:var(--accent)!important;
  box-shadow:0 0 0 3px rgba(99,102,241,.2),0 2px 8px rgba(99,102,241,.1)!important;
}

/* ══════════════════════════════════════════════
   KEYFRAMES
══════════════════════════════════════════════ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(22px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes fadeDown{
  from{opacity:0;transform:translateY(-16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{
  from{opacity:0;transform:scale(.88)}
  to{opacity:1;transform:scale(1)}
}
@keyframes slideRight{
  from{opacity:0;transform:translateX(-20px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes slideLeft{
  from{opacity:0;transform:translateX(20px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes pulseBig{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.4)}70%{box-shadow:0 0 0 10px rgba(99,102,241,0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes floatGlow{
  0%,100%{box-shadow:0 0 20px rgba(99,102,241,.35),0 0 40px rgba(99,102,241,.1)}
  50%{box-shadow:0 0 32px rgba(99,102,241,.55),0 0 60px rgba(167,139,250,.15)}
}
@keyframes borderDance{
  0%,100%{border-color:rgba(99,102,241,.3)}
  50%{border-color:rgba(167,139,250,.6)}
}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{
  0%{transform:scale(0) rotate(-15deg);opacity:0}
  70%{transform:scale(1.2) rotate(3deg);opacity:1}
  100%{transform:scale(1) rotate(0);opacity:1}
}
@keyframes scoreReveal{
  0%{opacity:0;transform:scale(.5)}
  60%{transform:scale(1.08)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes progressFill{from{width:0}to{width:var(--w)}}
@keyframes navSlide{from{opacity:0;transform:translateY(-100%)}to{opacity:1;transform:translateY(0)}}
@keyframes dotBounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes cardEntrance{
  from{opacity:0;transform:translateX(-10px) scale(.97)}
  to{opacity:1;transform:translateX(0) scale(1)}
}

/* ── Animation Classes ── */
.fade-up{animation:fadeUp .5s var(--ease-out) both}
.fade-down{animation:fadeDown .4s var(--ease-out) both}
.fade-in{animation:fadeIn .35s ease both}
.scale-in{animation:scaleIn .4s var(--ease-spring) both}
.slide-right{animation:slideRight .4s var(--ease-out) both}
.slide-left{animation:slideLeft .4s var(--ease-out) both}
.pop-in{animation:scaleIn .45s var(--ease-spring) both}

/* Stagger system */
.stagger>*{animation:fadeUp .5s var(--ease-out) both;opacity:0}
.stagger>*:nth-child(1){animation-delay:.04s}
.stagger>*:nth-child(2){animation-delay:.1s}
.stagger>*:nth-child(3){animation-delay:.16s}
.stagger>*:nth-child(4){animation-delay:.22s}
.stagger>*:nth-child(5){animation-delay:.28s}

.stagger-sm>*{animation:fadeUp .4s var(--ease-out) both;opacity:0}
.stagger-sm>*:nth-child(1){animation-delay:.02s}
.stagger-sm>*:nth-child(2){animation-delay:.06s}
.stagger-sm>*:nth-child(3){animation-delay:.10s}
.stagger-sm>*:nth-child(4){animation-delay:.14s}
.stagger-sm>*:nth-child(5){animation-delay:.18s}
.stagger-sm>*:nth-child(6){animation-delay:.22s}
.stagger-sm>*:nth-child(7){animation-delay:.26s}
.stagger-sm>*:nth-child(8){animation-delay:.30s}
.stagger-sm>*:nth-child(9){animation-delay:.34s}
.stagger-sm>*:nth-child(10){animation-delay:.38s}

/* ── Glass card ── */
.glass{
  background:rgba(15,14,42,.75);
  backdrop-filter:blur(20px) saturate(1.2);
  -webkit-backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid rgba(99,102,241,.15);
  border-radius:22px;
}

/* ── Button glow ── */
.btn-glow{
  position:relative;overflow:hidden;
  transition:transform .2s var(--ease-spring),box-shadow .2s var(--ease-out);
  cursor:pointer;
}
.btn-glow::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 55%,rgba(255,255,255,.04) 100%);
  opacity:0;transition:opacity .25s;
}
.btn-glow:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 10px 28px rgba(99,102,241,.45)}
.btn-glow:hover::before{opacity:1}
.btn-glow:active{transform:translateY(0) scale(.98);transition-duration:.08s}

/* ── Ripple ── */
.ripple{position:relative;overflow:hidden}
.ripple::after{
  content:'';position:absolute;
  width:0;height:0;border-radius:50%;
  background:rgba(255,255,255,.18);
  top:50%;left:50%;transform:translate(-50%,-50%);
  transition:width .5s var(--ease-out),height .5s var(--ease-out),opacity .5s;
  opacity:0;
}
.ripple:active::after{width:260%;height:260%;opacity:0;transition-duration:.4s}

/* ── Card hover lift ── */
.card-hover{
  transition:transform .25s var(--ease-out),border-color .25s,box-shadow .25s var(--ease-out);
}
.card-hover:hover{
  transform:translateY(-4px) scale(1.005);
  border-color:rgba(99,102,241,.5)!important;
  box-shadow:0 16px 40px rgba(99,102,241,.2),0 4px 8px rgba(0,0,0,.3)!important;
}
.card-hover:active{transform:translateY(-1px) scale(1.002);transition-duration:.1s}

/* ── Live dot ── */
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2.2s ease-in-out infinite;
  display:inline-block;flex-shrink:0;
}

/* ── Badge ── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:99px;
  font-size:11px;font-weight:700;letter-spacing:.2px;
}

/* ── Difficulty ── */
.diff-easy{background:rgba(34,211,165,.1);color:#2dd4bf;border:1px solid rgba(34,211,165,.25)}
.diff-med{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
.diff-hard{background:rgba(248,113,113,.1);color:#fca5a5;border:1px solid rgba(248,113,113,.25)}

/* ── DPP accent card ── */
.dpp-accent-card{position:relative}
.dpp-accent-card::before{
  content:'';
  position:absolute;left:0;top:12%;bottom:12%;
  width:3px;
  background:linear-gradient(180deg,#6366f1,#a78bfa,#38bdf8);
  border-radius:99px;
  transition:top .3s,bottom .3s,opacity .3s;
}
.dpp-accent-card:hover::before{top:0;bottom:0;opacity:1}

/* ── Greeting card ── */
.greeting-card{
  background:linear-gradient(135deg,rgba(99,102,241,.13) 0%,rgba(124,58,237,.07) 50%,rgba(56,189,248,.04) 100%);
  border:1px solid rgba(99,102,241,.22);
  border-radius:20px;padding:18px 20px;margin-bottom:16px;
  animation:borderDance 4s ease-in-out infinite;
  position:relative;overflow:hidden;
}
.greeting-card::after{
  content:'';position:absolute;top:-30%;right:-10%;
  width:180px;height:180px;
  background:radial-gradient(circle,rgba(167,139,250,.08) 0%,transparent 70%);
  pointer-events:none;
}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:14px}
.search-input{
  width:100%;padding:12px 16px 12px 42px;
  border-radius:14px;border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text);
  font-size:14px;font-family:inherit;
  transition:border-color .25s,box-shadow .25s,background .25s;
}
.search-input:focus{
  background:var(--surface);
  border-color:var(--accent)!important;
  box-shadow:0 0 0 3px rgba(99,102,241,.18)!important;
}
.search-input::placeholder{color:var(--muted)}
.search-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:15px;pointer-events:none;
  transition:color .25s;
}
.search-wrap:focus-within .search-icon{color:var(--accent2)}

/* ── Progress bar ── */
.prog-bar-wrap{height:7px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-bar-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,#4f46e5,#7c3aed,#a78bfa);
  background-size:200% 100%;
  animation:shimmer 2s linear infinite;
  transition:width .8s var(--ease-out);
}

/* ── Shimmer skeleton ── */
.shimmer{
  background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;border-radius:8px;
}

/* ── Score reveal ── */
.score-reveal{animation:scoreReveal .6s var(--ease-spring) both}
.check-pop{animation:checkPop .5s var(--ease-spring) both}

/* ── Tab indicator ── */
.tab-active{
  background:linear-gradient(135deg,#4f46e5,#7c3aed)!important;
  color:#fff!important;
  box-shadow:0 4px 16px rgba(99,102,241,.4)!important;
  transform:scale(1.02);
}

/* ── MCQ option ── */
.mcq-option{
  transition:background .18s,border-color .18s,transform .15s var(--ease-spring),box-shadow .18s;
  cursor:pointer;user-select:none;
}
.mcq-option:hover{background:rgba(99,102,241,.12)!important;border-color:rgba(99,102,241,.5)!important}
.mcq-option:active{transform:scale(.98)}
.mcq-option.selected{
  background:rgba(99,102,241,.18)!important;
  border-color:#6366f1!important;
  box-shadow:0 4px 14px rgba(99,102,241,.2);
}

/* ── Card entrance for DPP list ── */
.card-entrance{animation:cardEntrance .4s var(--ease-out) both}

/* ── Heading font ── */
h1,h2,h3,.display{font-family:'Space Grotesk',system-ui,sans-serif;letter-spacing:-.3px}

/* ── Nav bar glass ── */
.nav-glass{
  position:sticky;top:0;z-index:100;
  background:rgba(7,7,26,.85);
  backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  border-bottom:1px solid rgba(99,102,241,.12);
  animation:navSlide .4s var(--ease-out) both;
}

/* ── Floating label input ── */
.input-wrap{position:relative;margin-bottom:16px}
.input-label{
  display:block;font-size:11px;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:7px;transition:color .2s;
}
.input-wrap:focus-within .input-label{color:var(--accent2)}

/* ── Stat box ── */
.stat-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:14px 16px;flex:1;min-width:80px;
  transition:border-color .2s,transform .2s var(--ease-spring);
  animation:fadeUp .5s var(--ease-out) both;
}
.stat-box:hover{border-color:rgba(99,102,241,.4);transform:translateY(-2px)}

/* ── Loading dots ── */
.dot-loading span{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--accent2);margin:0 3px;
  animation:dotBounce 1.4s ease-in-out infinite;
}
.dot-loading span:nth-child(1){animation-delay:0s}
.dot-loading span:nth-child(2){animation-delay:.2s}
.dot-loading span:nth-child(3){animation-delay:.4s}

/* ── Responsive ── */
@media(max-width:420px){
  .hide-sm{display:none!important}
}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const TEACHER_PIN = "7210";

const MCQ_OPTS = ["A","B","C","D"];
function uid(){ return Math.random().toString(36).slice(2,9); }
function emptyOpts(){ return ["","","",""]; }
function emptyQ(){ return {text:"",type:"mcq",options:emptyOpts(),answer:"",marks:""}; }
function emptyDpp(){ return {title:"",batch:"",questions:[]}; }

// ── Firebase ──────────────────────────────────────────────────────────────
function dbSaveDpp(dpp){
  return firebase.database().ref("dpps/"+dpp.id).set(dpp);
}
function dbDeleteDpp(id){
  return firebase.database().ref("dpps/"+id).remove().then(()=>
    firebase.database().ref("submissions/"+id).remove()
  );
}
function dbSubmit(dppId,sub){
  return firebase.database().ref("submissions/"+dppId+"/"+sub.id).set(sub);
}
function useDpps(){
  const [dpps,setDpps]=useState({});
  useEffect(()=>{
    const ref=firebase.database().ref("dpps");
    ref.on("value",snap=>setDpps(snap.val()||{}));
    return ()=>ref.off();
  },[]);
  return dpps;
}
function useSubmissions(dppId){
  const [subs,setSubs]=useState({});
  useEffect(()=>{
    if(!dppId) return;
    const ref=firebase.database().ref("submissions/"+dppId);
    ref.on("value",snap=>setSubs(snap.val()||{}));
    return ()=>ref.off();
  },[dppId]);
  return subs;
}
function useAllSubmissions(){
  const [subs,setSubs]=useState({});
  useEffect(()=>{
    const ref=firebase.database().ref("submissions");
    ref.on("value",snap=>setSubs(snap.val()||{}));
    return ()=>ref.off();
  },[]);
  return subs;
}

// ── Seed ──────────────────────────────────────────────────────────────────
const SEED_DPP={id:"QE10CH4",title:"Quadratic Equations – DPP 1",batch:"class10",questions:[
  {text:"Which of the following is a quadratic equation?",type:"mcq",options:["2x + 5 = 0","x² - 7x + 10 = 0","x³ - 4 = 0","1/x + 2 = 0"],answer:"B",marks:"1",image:""},
  {text:"The roots of x² - 16 = 0 are:",type:"mcq",options:["4, -4","16, -16","8, -8","2, -2"],answer:"A",marks:"1",image:""},
  {text:"The sum of the roots of x² - 9x + 20 = 0 is:",type:"mcq",options:["20","9","-9","-20"],answer:"B",marks:"1",image:""},
  {text:"The product of the roots of x² - 8x + 15 = 0 is:",type:"mcq",options:["8","15","-8","-15"],answer:"B",marks:"1",image:""},
  {text:"The discriminant of x² - 6x + 9 = 0 is:",type:"mcq",options:["36","0","9","18"],answer:"B",marks:"1",image:""}
]};
function seedDpp(){
  firebase.database().ref("dpps/QE10CH4").once("value",function(snap){
    if(!snap.val()) firebase.database().ref("dpps/QE10CH4").set(SEED_DPP);
  });
}

// ── Score helper ──────────────────────────────────────────────────────────
function calcScore(dpp, answers){
  let got=0, total=0;
  if(!dpp||!dpp.questions) return {got:0,total:0,pct:0};
  const ans=answers||{};
  dpp.questions.forEach((q,i)=>{
    if(q.type!=="subjective"&&q.answer){
      total+=Number(q.marks||1);
      if((ans[i]||"").toUpperCase()===q.answer.toUpperCase()) got+=Number(q.marks||1);
    }
  });
  return {got, total, pct: total>0?Math.round((got/total)*100):0};
}

// ── Common Styles ─────────────────────────────────────────────────────────
const inputS={width:"100%",padding:"12px 16px",borderRadius:12,border:"1.5px solid var(--border)",fontSize:14,background:"var(--surface2)",color:"var(--text)",transition:"all .2s"};
const labelS={fontSize:11,fontWeight:700,color:"var(--accent2)",margin:"14px 0 6px",display:"block",textTransform:"uppercase",letterSpacing:1.5};
const btn=(bg,extra={})=>({background:bg,color:"#fff",border:"none",borderRadius:14,padding:"11px 22px",fontSize:14,fontWeight:700,cursor:"pointer",transition:"all .2s",letterSpacing:.3,...extra});
const card={background:"var(--surface)",border:"1px solid var(--border)",borderRadius:22,padding:"22px",backdropFilter:"blur(12px)"};

// ── APP ───────────────────────────────────────────────────────────────────
function App(){
  useEffect(()=>{ seedDpp(); },[]);
  const [mode,setMode]=useState(null);
  const [auth,setAuth]=useState(false);
  const [pin,setPin]=useState("");
  const [pinErr,setPinErr]=useState(false);
  if(!mode) return <Landing onSelect={setMode}/>;
  if(mode==="teacher"&&!auth) return <PinScreen pin={pin} setPin={setPin} error={pinErr}
    onSubmit={()=>{ if(pin===TEACHER_PIN){setAuth(true);setPinErr(false);}else{setPinErr(true);setPin("");} }}
    onBack={()=>setMode(null)}/>;
  if(mode==="teacher") return <TeacherPanel onBack={()=>{setMode(null);setAuth(false);}}/>;
  if(mode==="student") return <StudentHome onBack={()=>setMode(null)}/>;
  return null;
}

// ── LANDING ───────────────────────────────────────────────────────────────
function Landing({onSelect}){
  return(
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 55% 0%,#1a1060 0%,#08071a 55%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 16px",position:"relative",overflow:"hidden"}}>
      {/* Ambient blobs */}
      <div style={{position:"absolute",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(99,102,241,.1) 0%,transparent 65%)",top:-120,right:-100,pointerEvents:"none"}}/>
      <div style={{position:"absolute",width:350,height:350,borderRadius:"50%",background:"radial-gradient(circle,rgba(167,139,250,.07) 0%,transparent 65%)",bottom:-80,left:-80,pointerEvents:"none"}}/>
      <div style={{position:"absolute",width:200,height:200,borderRadius:"50%",background:"radial-gradient(circle,rgba(56,189,248,.05) 0%,transparent 70%)",top:"40%",left:"5%",pointerEvents:"none"}}/>
      <div className="fade-up" style={{textAlign:"center",maxWidth:420,width:"100%",position:"relative"}}>
        {/* Logo */}
        <div style={{position:"relative",display:"inline-block",marginBottom:22}}>
          <div style={{width:90,height:90,background:"linear-gradient(135deg,#6366f1,#a78bfa)",borderRadius:26,display:"flex",alignItems:"center",justifyContent:"center",fontSize:42,animation:"floatGlow 3.5s ease-in-out infinite"}}>📐</div>
