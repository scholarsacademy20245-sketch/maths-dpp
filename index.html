<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07071a;
  --surface:#0f0e2a;
  --surface2:#181636;
  --border:#2a2750;
  --accent:#6366f1;
  --accent2:#a78bfa;
  --accent3:#38bdf8;
  --green:#22d3a5;
  --red:#f87171;
  --gold:#f59e0b;
  --text:#e8e6ff;
  --muted:#7c78a8;
  --dim:#3d3a6e;
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --ease-out:cubic-bezier(.22,1,.36,1);
  --ease-in-out:cubic-bezier(.65,0,.35,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  background-image:
    radial-gradient(ellipse 80% 50% at 70% -10%,rgba(99,102,241,.09) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 90%,rgba(167,139,250,.06) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 90% 60%,rgba(56,189,248,.04) 0%,transparent 50%);
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,.4);border-radius:99px}

/* ── Base inputs ── */
input,textarea,select{
  font-family:inherit;
  transition:border-color .25s var(--ease-out),box-shadow .25s var(--ease-out),background .25s;
}
input:focus,textarea:focus,select:focus{
  outline:none;
  border-color:var(--accent)!important;
  box-shadow:0 0 0 3px rgba(99,102,241,.2),0 2px 8px rgba(99,102,241,.1)!important;
}

/* ══════════════════════════════════════════════
   KEYFRAMES
══════════════════════════════════════════════ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(22px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes fadeDown{
  from{opacity:0;transform:translateY(-16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{
  from{opacity:0;transform:scale(.88)}
  to{opacity:1;transform:scale(1)}
}
@keyframes slideRight{
  from{opacity:0;transform:translateX(-20px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes slideLeft{
  from{opacity:0;transform:translateX(20px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes pulseBig{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.4)}70%{box-shadow:0 0 0 10px rgba(99,102,241,0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes floatGlow{
  0%,100%{box-shadow:0 0 20px rgba(99,102,241,.35),0 0 40px rgba(99,102,241,.1)}
  50%{box-shadow:0 0 32px rgba(99,102,241,.55),0 0 60px rgba(167,139,250,.15)}
}
@keyframes borderDance{
  0%,100%{border-color:rgba(99,102,241,.3)}
  50%{border-color:rgba(167,139,250,.6)}
}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{
  0%{transform:scale(0) rotate(-15deg);opacity:0}
  70%{transform:scale(1.2) rotate(3deg);opacity:1}
  100%{transform:scale(1) rotate(0);opacity:1}
}
@keyframes scoreReveal{
  0%{opacity:0;transform:scale(.5)}
  60%{transform:scale(1.08)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes progressFill{from{width:0}to{width:var(--w)}}
@keyframes navSlide{from{opacity:0;transform:translateY(-100%)}to{opacity:1;transform:translateY(0)}}
@keyframes dotBounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes cardEntrance{
  from{opacity:0;transform:translateX(-10px) scale(.97)}
  to{opacity:1;transform:translateX(0) scale(1)}
}

/* ── Animation Classes ── */
.fade-up{animation:fadeUp .5s var(--ease-out) both}
.fade-down{animation:fadeDown .4s var(--ease-out) both}
.fade-in{animation:fadeIn .35s ease both}
.scale-in{animation:scaleIn .4s var(--ease-spring) both}
.slide-right{animation:slideRight .4s var(--ease-out) both}
.slide-left{animation:slideLeft .4s var(--ease-out) both}
.pop-in{animation:scaleIn .45s var(--ease-spring) both}

/* Stagger system */
.stagger>*{animation:fadeUp .5s var(--ease-out) both;opacity:0}
.stagger>*:nth-child(1){animation-delay:.04s}
.stagger>*:nth-child(2){animation-delay:.1s}
.stagger>*:nth-child(3){animation-delay:.16s}
.stagger>*:nth-child(4){animation-delay:.22s}
.stagger>*:nth-child(5){animation-delay:.28s}

.stagger-sm>*{animation:fadeUp .4s var(--ease-out) both;opacity:0}
.stagger-sm>*:nth-child(1){animation-delay:.02s}
.stagger-sm>*:nth-child(2){animation-delay:.06s}
.stagger-sm>*:nth-child(3){animation-delay:.10s}
.stagger-sm>*:nth-child(4){animation-delay:.14s}
.stagger-sm>*:nth-child(5){animation-delay:.18s}
.stagger-sm>*:nth-child(6){animation-delay:.22s}
.stagger-sm>*:nth-child(7){animation-delay:.26s}
.stagger-sm>*:nth-child(8){animation-delay:.30s}
.stagger-sm>*:nth-child(9){animation-delay:.34s}
.stagger-sm>*:nth-child(10){animation-delay:.38s}

/* ── Glass card ── */
.glass{
  background:rgba(15,14,42,.75);
  backdrop-filter:blur(20px) saturate(1.2);
  -webkit-backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid rgba(99,102,241,.15);
  border-radius:22px;
}

/* ── Button glow ── */
.btn-glow{
  position:relative;overflow:hidden;
  transition:transform .2s var(--ease-spring),box-shadow .2s var(--ease-out);
  cursor:pointer;
}
.btn-glow::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 55%,rgba(255,255,255,.04) 100%);
  opacity:0;transition:opacity .25s;
}
.btn-glow:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 10px 28px rgba(99,102,241,.45)}
.btn-glow:hover::before{opacity:1}
.btn-glow:active{transform:translateY(0) scale(.98);transition-duration:.08s}

/* ── Ripple ── */
.ripple{position:relative;overflow:hidden}
.ripple::after{
  content:'';position:absolute;
  width:0;height:0;border-radius:50%;
  background:rgba(255,255,255,.18);
  top:50%;left:50%;transform:translate(-50%,-50%);
  transition:width .5s var(--ease-out),height .5s var(--ease-out),opacity .5s;
  opacity:0;
}
.ripple:active::after{width:260%;height:260%;opacity:0;transition-duration:.4s}

/* ── Card hover lift ── */
.card-hover{
  transition:transform .25s var(--ease-out),border-color .25s,box-shadow .25s var(--ease-out);
}
.card-hover:hover{
  transform:translateY(-4px) scale(1.005);
  border-color:rgba(99,102,241,.5)!important;
  box-shadow:0 16px 40px rgba(99,102,241,.2),0 4px 8px rgba(0,0,0,.3)!important;
}
.card-hover:active{transform:translateY(-1px) scale(1.002);transition-duration:.1s}

/* ── Live dot ── */
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2.2s ease-in-out infinite;
  display:inline-block;flex-shrink:0;
}

/* ── Badge ── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:99px;
  font-size:11px;font-weight:700;letter-spacing:.2px;
}

/* ── Difficulty ── */
.diff-easy{background:rgba(34,211,165,.1);color:#2dd4bf;border:1px solid rgba(34,211,165,.25)}
.diff-med{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
.diff-hard{background:rgba(248,113,113,.1);color:#fca5a5;border:1px solid rgba(248,113,113,.25)}

/* ── DPP accent card ── */
.dpp-accent-card{position:relative}
.dpp-accent-card::before{
  content:'';
  position:absolute;left:0;top:12%;bottom:12%;
  width:3px;
  background:linear-gradient(180deg,#6366f1,#a78bfa,#38bdf8);
  border-radius:99px;
  transition:top .3s,bottom .3s,opacity .3s;
}
.dpp-accent-card:hover::before{top:0;bottom:0;opacity:1}

/* ── Greeting card ── */
.greeting-card{
  background:linear-gradient(135deg,rgba(99,102,241,.13) 0%,rgba(124,58,237,.07) 50%,rgba(56,189,248,.04) 100%);
  border:1px solid rgba(99,102,241,.22);
  border-radius:20px;padding:18px 20px;margin-bottom:16px;
  animation:borderDance 4s ease-in-out infinite;
  position:relative;overflow:hidden;
}
.greeting-card::after{
  content:'';position:absolute;top:-30%;right:-10%;
  width:180px;height:180px;
  background:radial-gradient(circle,rgba(167,139,250,.08) 0%,transparent 70%);
  pointer-events:none;
}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:14px}
.search-input{
  width:100%;padding:12px 16px 12px 42px;
  border-radius:14px;border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text);
  font-size:14px;font-family:inherit;
  transition:border-color .25s,box-shadow .25s,background .25s;
}
.search-input:focus{
  background:var(--surface);
  border-color:var(--accent)!important;
  box-shadow:0 0 0 3px rgba(99,102,241,.18)!important;
}
.search-input::placeholder{color:var(--muted)}
.search-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:15px;pointer-events:none;
  transition:color .25s;
}
.search-wrap:focus-within .search-icon{color:var(--accent2)}

/* ── Progress bar ── */
.prog-bar-wrap{height:7px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-bar-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,#4f46e5,#7c3aed,#a78bfa);
  background-size:200% 100%;
  animation:shimmer 2s linear infinite;
  transition:width .8s var(--ease-out);
}

/* ── Shimmer skeleton ── */
.shimmer{
  background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;border-radius:8px;
}

/* ── Score reveal ── */
.score-reveal{animation:scoreReveal .6s var(--ease-spring) both}
.check-pop{animation:checkPop .5s var(--ease-spring) both}

/* ── Tab indicator ── */
.tab-active{
  background:linear-gradient(135deg,#4f46e5,#7c3aed)!important;
  color:#fff!important;
  box-shadow:0 4px 16px rgba(99,102,241,.4)!important;
  transform:scale(1.02);
}

/* ── MCQ option ── */
.mcq-option{
  transition:background .18s,border-color .18s,transform .15s var(--ease-spring),box-shadow .18s;
  cursor:pointer;user-select:none;
}
.mcq-option:hover{background:rgba(99,102,241,.12)!important;border-color:rgba(99,102,241,.5)!important}
.mcq-option:active{transform:scale(.98)}
.mcq-option.selected{
  background:rgba(99,102,241,.18)!important;
  border-color:#6366f1!important;
  box-shadow:0 4px 14px rgba(99,102,241,.2);
}

/* ── Card entrance for DPP list ── */
.card-entrance{animation:cardEntrance .4s var(--ease-out) both}

/* ── Heading font ── */
h1,h2,h3,.display{font-family:'Space Grotesk',system-ui,sans-serif;letter-spacing:-.3px}

/* ── Nav bar glass ── */
.nav-glass{
  position:sticky;top:0;z-index:100;
  background:rgba(7,7,26,.85);
  backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  border-bottom:1px solid rgba(99,102,241,.12);
  animation:navSlide .4s var(--ease-out) both;
}

/* ── Floating label input ── */
.input-wrap{position:relative;margin-bottom:16px}
.input-label{
  display:block;font-size:11px;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:7px;transition:color .2s;
}
.input-wrap:focus-within .input-label{color:var(--accent2)}

/* ── Stat box ── */
.stat-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:14px 16px;flex:1;min-width:80px;
  transition:border-color .2s,transform .2s var(--ease-spring);
  animation:fadeUp .5s var(--ease-out) both;
}
.stat-box:hover{border-color:rgba(99,102,241,.4);transform:translateY(-2px)}

/* ── Loading dots ── */
.dot-loading span{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--accent2);margin:0 3px;
  animation:dotBounce 1.4s ease-in-out infinite;
}
.dot-loading span:nth-child(1){animation-delay:0s}
.dot-loading span:nth-child(2){animation-delay:.2s}
.dot-loading span:nth-child(3){animation-delay:.4s}

/* ── Responsive ── */
@media(max-width:420px){
  .hide-sm{display:none!important}
}
</style>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const TEACHER_PIN = "7210";
const _k=["c2stYW50LWFwaTAzLVNrcXJWRnZlbkM3RUxEVGdLYXhi","YmhZVlRqSlBFbFFjSXAtWGY0SUlpbXQ5XzdyOEFKNlZs","TU01T093b19sMWo4dUY2TzJLY0ZxSGdmY3hsZVJ2N0JB","LTA4TEtUUUFB"];const AI_KEY=atob(_k.join(""));
const MCQ_OPTS = ["A","B","C","D"];
function uid(){ return Math.random().toString(36).slice(2,9); }
function emptyOpts(){ return ["","","",""]; }
function emptyQ(){ return {text:"",type:"mcq",options:emptyOpts(),answer:"",marks:""}; }
function emptyDpp(){ return {title:"",batch:"",questions:[]}; }

// ── Firebase ──────────────────────────────────────────────────────────────
function dbSaveDpp(dpp){
  return firebase.database().ref("dpps/"+dpp.id).set(dpp);
}
function dbDeleteDpp(id){
  return firebase.database().ref("dpps/"+id).remove().then(()=>
    firebase.database().ref("submissions/"+id).remove()
  );
}
function dbSubmit(dppId,sub){
  return firebase.database().ref("submissions/"+dppId+"/"+sub.id).set(sub);
}
function useDpps(){
  const [dpps,setDpps]=useState({});
  useEffect(()=>{
    const ref=firebase.database().ref("dpps");
    ref.on("value",snap=>setDpps(snap.val()||{}));
    return ()=>ref.off();
  },[]);
  return dpps;
}
function useSubmissions(dppId){
  const [subs,setSubs]=useState({});
  useEffect(()=>{
    if(!dppId) return;
    const ref=firebase.database().ref("submissions/"+dppId);
    ref.on("value",snap=>setSubs(snap.val()||{}));
    return ()=>ref.off();
  },[dppId]);
  return subs;
}
function useAllSubmissions(){
  const [subs,setSubs]=useState({});
  useEffect(()=>{
    const ref=firebase.database().ref("submissions");
    ref.on("value",snap=>setSubs(snap.val()||{}));
    return ()=>ref.off();
  },[]);
  return subs;
}

// ── Seed ──────────────────────────────────────────────────────────────────
const SEED_DPP={id:"QE10CH4",title:"Quadratic Equations – DPP 1",batch:"class10",questions:[
  {text:"Which of the following is a quadratic equation?",type:"mcq",options:["2x + 5 = 0","x² - 7x + 10 = 0","x³ - 4 = 0","1/x + 2 = 0"],answer:"B",marks:"1",image:""},
  {text:"The roots of x² - 16 = 0 are:",type:"mcq",options:["4, -4","16, -16","8, -8","2, -2"],answer:"A",marks:"1",image:""},
  {text:"The sum of the roots of x² - 9x + 20 = 0 is:",type:"mcq",options:["20","9","-9","-20"],answer:"B",marks:"1",image:""},
  {text:"The product of the roots of x² - 8x + 15 = 0 is:",type:"mcq",options:["8","15","-8","-15"],answer:"B",marks:"1",image:""},
  {text:"The discriminant of x² - 6x + 9 = 0 is:",type:"mcq",options:["36","0","9","18"],answer:"B",marks:"1",image:""}
]};
function seedDpp(){
  firebase.database().ref("dpps/QE10CH4").once("value",function(snap){
    if(!snap.val()) firebase.database().ref("dpps/QE10CH4").set(SEED_DPP);
  });
}

// ── Score helper ──────────────────────────────────────────────────────────
function calcScore(dpp, answers){
  let got=0, total=0;
  if(!dpp||!dpp.questions) return {got:0,total:0,pct:0};
  const ans=answers||{};
  dpp.questions.forEach((q,i)=>{
    if(q.type!=="subjective"&&q.answer){
      total+=Number(q.marks||1);
      if((ans[i]||"").toUpperCase()===q.answer.toUpperCase()) got+=Number(q.marks||1);
    }
  });
  return {got, total, pct: total>0?Math.round((got/total)*100):0};
}

// ── Common Styles ─────────────────────────────────────────────────────────
const inputS={width:"100%",padding:"12px 16px",borderRadius:12,border:"1.5px solid var(--border)",fontSize:14,background:"var(--surface2)",color:"var(--text)",transition:"all .2s"};
const labelS={fontSize:11,fontWeight:700,color:"var(--accent2)",margin:"14px 0 6px",display:"block",textTransform:"uppercase",letterSpacing:1.5};
const btn=(bg,extra={})=>({background:bg,color:"#fff",border:"none",borderRadius:14,padding:"11px 22px",fontSize:14,fontWeight:700,cursor:"pointer",transition:"all .2s",letterSpacing:.3,...extra});
const card={background:"var(--surface)",border:"1px solid var(--border)",borderRadius:22,padding:"22px",backdropFilter:"blur(12px)"};

// ── APP ───────────────────────────────────────────────────────────────────
function App(){
  useEffect(()=>{ seedDpp(); },[]);
  const [mode,setMode]=useState(null);
  const [auth,setAuth]=useState(false);
  const [pin,setPin]=useState("");
  const [pinErr,setPinErr]=useState(false);
  if(!mode) return <Landing onSelect={setMode}/>;
  if(mode==="teacher"&&!auth) return <PinScreen pin={pin} setPin={setPin} error={pinErr}
    onSubmit={()=>{ if(pin===TEACHER_PIN){setAuth(true);setPinErr(false);}else{setPinErr(true);setPin("");} }}
    onBack={()=>setMode(null)}/>;
  if(mode==="teacher") return <TeacherPanel onBack={()=>{setMode(null);setAuth(false);}}/>;
  if(mode==="student") return <StudentHome onBack={()=>setMode(null)}/>;
  return null;
}

// ── LANDING ───────────────────────────────────────────────────────────────
function Landing({onSelect}){
  return(
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 55% 0%,#1a1060 0%,#08071a 55%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 16px",position:"relative",overflow:"hidden"}}>
      {/* Ambient blobs */}
      <div style={{position:"absolute",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(99,102,241,.1) 0%,transparent 65%)",top:-120,right:-100,pointerEvents:"none"}}/>
      <div style={{position:"absolute",width:350,height:350,borderRadius:"50%",background:"radial-gradient(circle,rgba(167,139,250,.07) 0%,transparent 65%)",bottom:-80,left:-80,pointerEvents:"none"}}/>
      <div style={{position:"absolute",width:200,height:200,borderRadius:"50%",background:"radial-gradient(circle,rgba(56,189,248,.05) 0%,transparent 70%)",top:"40%",left:"5%",pointerEvents:"none"}}/>
      <div className="fade-up" style={{textAlign:"center",maxWidth:420,width:"100%",position:"relative"}}>

// ── LEADERBOARD ───────────────────────────────────────────────────────────
function Leaderboard(){
  const dpps=useDpps();
  const allSubs=useAllSubmissions();
  const [filterClass,setFilterClass]=useState("all");
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    // Wait for both dpps and subs to load
    if(Object.keys(dpps).length>0 || Object.keys(allSubs).length>=0){
      setLoading(false);
    }
  },[dpps,allSubs]);

  // Build leaderboard
  const studentMap={};
  Object.entries(allSubs).forEach(([dppId,dppSubs])=>{
    if(!dppSubs||typeof dppSubs!=="object") return;
    const dpp=dpps[dppId];
    if(!dpp) return;
    if(filterClass!=="all"&&dpp.batch!==filterClass) return;
    Object.values(dppSubs).forEach(sub=>{
      if(!sub||!sub.studentName) return;
      const answers=sub.answers||{};
      const {got,total,pct}=calcScore(dpp,answers);
      if(!studentMap[sub.studentName]) studentMap[sub.studentName]={name:sub.studentName,totalGot:0,totalMax:0,attempts:0,bestPct:0};
      studentMap[sub.studentName].totalGot+=got;
      studentMap[sub.studentName].totalMax+=total;
      studentMap[sub.studentName].attempts+=1;
      if(pct>studentMap[sub.studentName].bestPct) studentMap[sub.studentName].bestPct=pct;
    });
  });

  const board=Object.values(studentMap)
    .map(s=>({...s,avgPct:s.totalMax>0?Math.round((s.totalGot/s.totalMax)*100):0}))
    .sort((a,b)=>b.avgPct-a.avgPct);
  
  if(loading) return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:32,animation:"spin 1s linear infinite",display:"inline-block"}}>⏳</div>
      <p style={{color:"var(--muted)",marginTop:8}}>Loading...</p>
    </div>
  );

  const medals=["🥇","🥈","🥉"];
  const colors=["#f59e0b","#94a3b8","#cd7c2f"];

  return(
    <div className="fade-up">
      {/* Filter */}
      <div style={{display:"flex",gap:6,marginBottom:16,background:"var(--surface)",borderRadius:16,padding:5,border:"1px solid var(--border)"}}>
        {[["all","🌐 All"],["class10","Class 10"],["class8","Class 8"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFilterClass(k)}
            className="btn-glow"
            style={{flex:1,padding:"9px 4px",borderRadius:12,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,
              background:filterClass===k?"linear-gradient(135deg,#4f46e5,#7c3aed)":"transparent",
              color:filterClass===k?"#fff":"var(--muted)",transition:"all .25s",
              boxShadow:filterClass===k?"0 4px 12px rgba(99,102,241,.3)":"none"}}>
            {l}
          </button>
        ))}
      </div>

      {board.length===0?(
        <div style={{textAlign:"center",padding:"40px 0"}}>
          <div style={{fontSize:44,marginBottom:8}}>📭</div>
          <p style={{color:"var(--muted)"}}>Abhi koi submission nahi hai.</p>
        </div>
      ):(
        <>
          {/* Top 3 podium */}
          {board.length>=1&&(
            <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:10,marginBottom:20}}>
              {[board[1],board[0],board[2]].map((s,pi)=>{
                if(!s) return <div key={pi} style={{flex:1}}/>;
                const realRank=pi===0?1:pi===1?0:2;
                const heights=["140px","170px","120px"];
                const bgColors=["var(--surface)","var(--surface2)","var(--surface)"];
                return(
                  <div key={pi} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                    <div style={{fontSize:pi===1?28:22,marginBottom:4}}>{medals[realRank]}</div>
                    <p style={{color:"var(--text)",fontWeight:800,fontSize:12,textAlign:"center",marginBottom:6,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</p>
                    <div style={{width:"100%",height:heights[pi],background:bgColors[pi],borderRadius:"12px 12px 0 0",
                      border:`2px solid ${colors[realRank]}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                      <p style={{color:colors[realRank],fontWeight:900,fontSize:pi===1?24:18}}>{s.avgPct}%</p>
                      <p style={{color:"var(--muted)",fontSize:10}}>{s.attempts} DPPs</p>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Full List */}
          <div style={{...card,padding:"16px"}}>
            <p style={{color:"var(--accent2)",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Full Rankings</p>
            {board.map((s,i)=>(
              <div key={s.name} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 10px",borderRadius:12,marginBottom:6,
                background:i<3?"var(--surface2)":"transparent",border:i<3?"1px solid #2d2a5e":"1px solid transparent"}}>
                <div style={{width:32,height:32,borderRadius:10,background:i<3?`${colors[i]}22`:"var(--surface2)",
                  display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,
                  color:i<3?colors[i]:"var(--dim)",fontSize:i<3?18:14,flexShrink:0}}>
                  {i<3?medals[i]:i+1}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:700,color:"var(--text)",fontSize:14,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</p>
                  {/* Progress Bar */}
                  <div style={{height:6,background:"var(--border)",borderRadius:99,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${s.avgPct}%`,background:i===0?"linear-gradient(90deg,#f59e0b,#fbbf24)":i===1?"linear-gradient(90deg,#94a3b8,#cbd5e1)":i===2?"linear-gradient(90deg,#cd7c2f,#d97706)":"linear-gradient(90deg,#4f46e5,#7c3aed)",borderRadius:99,transition:"width 1s ease"}}/>
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <p style={{fontWeight:900,color:i<3?colors[i]:"var(--text)",fontSize:16}}>{s.avgPct}%</p>
                  <p style={{color:"var(--dim)",fontSize:11}}>{s.totalGot}/{s.totalMax}M</p>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ── DPP ATTEMPT ───────────────────────────────────────────────────────────
function DppAttempt({dpp,name,onBack}){
  const [answers,setAnswers]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const [result,setResult]=useState(null);
  const [sharing,setSharing]=useState(false);
  const [copied,setCopied]=useState(false);
  const scoreCardRef=useRef(null);

  const answered=Object.keys(answers).length;
  const total=dpp.questions.length;
  const progress=Math.round((answered/total)*100);

  async function submit(){
    setSubmitting(true);
    const sub={id:uid(),dppId:dpp.id,studentName:name,answers,submittedAt:Date.now()};
    await dbSubmit(dpp.id,sub);
    setResult(calcScore(dpp,answers));
    setSubmitted(true);setSubmitting(false);
  }

  if(submitted&&result){
    const emoji=result.pct>=80?"🏆":result.pct>=50?"👍":"💪";
    const msg=result.pct>=80?"Shaabaash! Bahut achha kiya!":result.pct>=50?"Achha hua! Aur practice karo!":"Koi baat nahi! Agli baar aur mehnat karo!";

    const correctCount=dpp.questions.filter((_,i)=>{const q=dpp.questions[i];return q.type!=="subjective"&&q.answer&&(answers[i]||"").toUpperCase()===q.answer.toUpperCase();}).length;
    const wrongCount=dpp.questions.filter((_,i)=>{const q=dpp.questions[i];return q.type!=="subjective"&&q.answer&&answers[i]&&(answers[i]||"").toUpperCase()!==q.answer.toUpperCase();}).length;
    const skipCount=dpp.questions.filter((_,i)=>!answers[i]).length;

    function buildShareText(){
      const stars=result.pct>=80?"⭐⭐⭐":result.pct>=50?"⭐⭐":"⭐";
      return "📐 *Sameer Sir – Maths DPP*\n\n"+
        "👤 Student: *"+name+"*\n"+
        "📋 DPP: *"+dpp.title+"*\n"+
        "📅 Date: "+new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})+"\n\n"+
        "━━━━━━━━━━━━━━━\n"+
        stars+" *Score: "+result.got+"/"+result.total+" ("+result.pct+"%)* \n"+
        "━━━━━━━━━━━━━━━\n\n"+
        "✅ Sahi: "+correctCount+"\n"+
        "❌ Galat: "+wrongCount+"\n"+
        "⏭ Chhoda: "+skipCount+"\n\n"+
        msg+"\n\n"+
        "_Powered by Sameer Sir DPP Portal_ 🚀";
    }

    function shareWhatsApp(){
      const text=encodeURIComponent(buildShareText());
      window.open("https://wa.me/?text="+text,"_blank");
    }

    async function copyResult(){
      try{
        await navigator.clipboard.writeText(buildShareText());
      }catch(e){
        const ta=document.createElement("textarea");
        ta.value=buildShareText();
        document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
      }
      setCopied(true);setTimeout(()=>setCopied(false),2500);
    }

    async function shareNative(){
      if(navigator.share){try{await navigator.share({title:"Maths DPP Result",text:buildShareText()});}catch(e){}}
      else shareWhatsApp();
    }

    async function downloadCard(){
      setSharing(true);
      const loadLib=()=>new Promise((res,rej)=>{
        if(window.html2canvas)return res();
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
      try{
        await loadLib();
        const canvas=await window.html2canvas(scoreCardRef.current,{backgroundColor:"#0f0c29",scale:2,useCORS:true});
        const link=document.createElement("a");
        link.download="DPP_Result_"+name+".png";
        link.href=canvas.toDataURL("image/png");link.click();
      }catch(e){alert("Screenshot nahi ho saka. Text copy karein!");}
      setSharing(false);
    }

    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f0c29,#302b63,#24243e)",padding:"22px 16px"}}>
        <div className="fade-up" style={{maxWidth:600,margin:"0 auto"}}>

          {/* Shareable Score Card */}
          <div ref={scoreCardRef} style={{...card,textAlign:"center",marginBottom:16,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-40,right:-40,width:180,height:180,borderRadius:"50%",background:"radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%)",pointerEvents:"none"}}/>
            <div style={{position:"absolute",bottom:-30,left:-30,width:140,height:140,borderRadius:"50%",background:"radial-gradient(circle,rgba(167,139,250,.08) 0%,transparent 70%)",pointerEvents:"none"}}/>
            <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(99,102,241,.12)",border:"1px solid rgba(99,102,241,.25)",borderRadius:99,padding:"4px 14px",marginBottom:14}}>
              <span style={{fontSize:11,color:"var(--accent2)",fontWeight:700,letterSpacing:.5}}>📐 SAMEER SIR MATHS DPP</span>
            </div>
            <div style={{fontSize:60,marginBottom:6}}>{emoji}</div>
            <h2 style={{color:"var(--text)",fontWeight:900,fontSize:22,marginBottom:2}}>Submit Ho Gaya!</h2>
            <p style={{color:"var(--muted)",fontSize:13,marginBottom:4}}>{dpp.title}</p>
            <p style={{color:"var(--accent2)",fontSize:13,fontWeight:700,marginBottom:16}}>👤 {name}</p>
            {result.total>0&&(
              <div style={{background:"linear-gradient(135deg,#312e81,#1e1b4b)",border:"2px solid #4f46e5",borderRadius:20,padding:"22px",marginBottom:16,display:"inline-block",minWidth:220,boxShadow:"0 8px 32px rgba(99,102,241,.35)"}}>
                <p style={{color:"var(--muted)",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,marginBottom:10}}>Your Score</p>
                <div style={{display:"flex",alignItems:"baseline",justifyContent:"center",gap:4}}>
                  <span style={{fontSize:48,fontWeight:900,color:"var(--accent2)",fontFamily:"'Space Grotesk',sans-serif"}}>{result.got}</span>
                  <span style={{fontSize:22,color:"var(--dim)",fontFamily:"'Space Grotesk',sans-serif"}}>/</span>
                  <span style={{fontSize:48,fontWeight:900,color:"var(--text)",fontFamily:"'Space Grotesk',sans-serif"}}>{result.total}</span>
                </div>
                <div style={{height:8,background:"rgba(255,255,255,.08)",borderRadius:99,margin:"14px 0 8px",overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${result.pct}%`,background:"linear-gradient(90deg,#6366f1,#a78bfa)",borderRadius:99,transition:"width 1.4s var(--ease-out)"}}/>
                </div>
                <p style={{color:"var(--accent2)",fontWeight:900,fontSize:26,fontFamily:"'Space Grotesk',sans-serif"}}>{result.pct}%</p>
              </div>
            )}
            <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:8,marginBottom:10,flexWrap:"wrap"}}>
              {[{icon:"✅",label:"Sahi",val:correctCount,color:"var(--green)"},{icon:"❌",label:"Galat",val:wrongCount,color:"var(--red)"},{icon:"⏭",label:"Chhoda",val:skipCount,color:"var(--muted)"}].map(s=>(
                <div key={s.label} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:12,padding:"8px 18px",textAlign:"center"}}>
                  <p style={{fontSize:18,marginBottom:2}}>{s.icon}</p>
                  <p style={{color:s.color,fontWeight:900,fontSize:16}}>{s.val}</p>
                  <p style={{color:"var(--muted)",fontSize:10,fontWeight:600}}>{s.label}</p>
                </div>
              ))}
            </div>
            <p style={{color:"var(--muted)",fontSize:13,marginTop:4}}>{msg}</p>
            <p style={{color:"var(--dim)",fontSize:10,marginTop:8}}>{new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}</p>
          </div>

          {/* Share Buttons */}
          <div style={{...card,marginBottom:16}}>
            <p style={{color:"var(--accent2)",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:14,textAlign:"center"}}>📤 Result Share Karo</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={shareWhatsApp} className="btn-glow ripple" style={{...btn("linear-gradient(135deg,#16a34a,#15803d)"),width:"100%",padding:"14px",fontSize:15,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                <span style={{fontSize:20}}>💬</span> WhatsApp par Share Karo
              </button>
              {typeof navigator!=="undefined"&&navigator.share&&(
                <button onClick={shareNative} className="btn-glow ripple" style={{...btn("linear-gradient(135deg,#0891b2,#0e7490)"),width:"100%",padding:"14px",fontSize:15,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  <span style={{fontSize:20}}>📲</span> Share Karo (Apps)
                </button>
              )}
              <button onClick={copyResult} className="btn-glow ripple" style={{...btn(copied?"linear-gradient(135deg,#16a34a,#15803d)":"linear-gradient(135deg,#7c3aed,#4f46e5)"),width:"100%",padding:"14px",fontSize:15,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",gap:10,transition:"all .3s"}}>
                <span style={{fontSize:20}}>{copied?"✅":"📋"}</span>{copied?"Copied! Ab paste karo":"Text Copy Karo"}
              </button>
              <button onClick={downloadCard} disabled={sharing} className="btn-glow ripple" style={{...btn("linear-gradient(135deg,#b45309,#d97706)"),width:"100%",padding:"14px",fontSize:15,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",gap:10,opacity:sharing?0.7:1}}>
                <span style={{fontSize:20}}>{sharing?"⏳":"📸"}</span>{sharing?"Screenshot le raha hai...":"Screenshot Download Karo"}
              </button>
            </div>
          </div>

          {/* Result Breakdown */}
          <div style={{...card,marginBottom:16}}>
            <p style={{color:"var(--accent2)",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Result Breakdown</p>
            {dpp.questions.map((q,i)=>{
              const studentAns=answers[i];
              const isSubj=q.type==="subjective";
              const isCorrect=!isSubj&&q.answer&&(studentAns||"").toUpperCase()===q.answer.toUpperCase();
              const isWrong=!isSubj&&q.answer&&studentAns&&!isCorrect;
              return(
                <div key={i} style={{border:"1.5px solid",borderColor:isCorrect?"#16a34a44":isWrong?"#ef444444":"var(--border)",
                  borderRadius:12,padding:"12px 14px",marginBottom:8,background:isCorrect?"#14532d12":isWrong?"#7f1d1d12":"var(--surface2)"}}>
                  <p style={{fontWeight:700,color:"var(--text)",marginBottom:6,fontSize:13}}>
                    {isCorrect?"✅":isWrong?"❌":"📝"} Q{i+1}. {q.text}
                    {q.marks&&<span style={{color:"var(--dim)",fontWeight:400,fontSize:11}}> [{q.marks}M]</span>}
                  </p>
                  {q.image&&<img src={q.image} alt="" style={{maxWidth:"100%",maxHeight:160,borderRadius:8,marginBottom:6,display:"block"}}/>}
                  <p style={{fontSize:12,color:"var(--accent2)"}}>Aapka Jawab: <strong style={{color:isCorrect?"var(--green)":isWrong?"var(--red)":"var(--text)"}}>{studentAns||"—"}</strong></p>
                  {isWrong&&(
                    <p style={{fontSize:12,fontWeight:700,color:"var(--green)",marginTop:5,background:"#14532d22",borderRadius:8,padding:"5px 10px",display:"inline-block"}}>
                      ✅ Sahi Jawab: {q.answer}{q.type==="mcq"&&q.options[MCQ_OPTS.indexOf(q.answer)]&&<span> — {q.options[MCQ_OPTS.indexOf(q.answer)]}</span>}
                    </p>
                  )}
                </div>
              );
            })}
          </div>
          <button onClick={onBack} style={{...btn("linear-gradient(135deg,#4f46e5,#7c3aed)"),width:"100%",padding:"13px",fontSize:15,marginBottom:28}}>← Wapas Jao</button>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f0c29,#302b63,#24243e)",padding:"20px 16px"}}>
      <div style={{maxWidth:640,margin:"0 auto"}}>
        {/* Header + Progress */}
        <div className="fade-up" style={{...card,marginBottom:14}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:"var(--accent2)",fontSize:13,cursor:"pointer",fontWeight:600,marginBottom:8,display:"block"}}>← Back</button>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div>
              <h2 style={{color:"var(--text)",fontWeight:800,fontSize:17}}>{dpp.title}</h2>
              <p style={{color:"var(--muted)",fontSize:12,marginTop:2}}>👤 {name} · {total} Questions</p>
            </div>
            <div style={{background:"var(--surface2)",border:"1px solid #312e81",borderRadius:12,padding:"8px 14px",textAlign:"center"}}>
              <p style={{color:"var(--accent2)",fontWeight:900,fontSize:16}}>{answered}/{total}</p>
              <p style={{color:"var(--dim)",fontSize:10,fontWeight:600}}>ANSWERED</p>
            </div>
          </div>
          {/* Progress Bar */}
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1,height:8,background:"var(--border)",borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${progress}%`,background:"linear-gradient(90deg,#4f46e5,#a78bfa)",borderRadius:99,transition:"width 0.4s ease"}}/>
            </div>
            <span style={{color:"var(--accent2)",fontWeight:700,fontSize:13,minWidth:36}}>{progress}%</span>
          </div>
        </div>

        {dpp.questions.map((q,i)=>(
          <div key={i} className="fade-up" style={{...card,borderColor:answers[i]?"#4f46e5":"var(--border)",marginBottom:10}}>
            <p style={{fontWeight:800,color:"var(--text)",marginBottom:12,fontSize:14,lineHeight:1.5}}>
              <span style={{color:"var(--accent2)",marginRight:6}}>Q{i+1}.</span>{q.text}
              {q.marks&&<span style={{color:"var(--dim)",fontWeight:400,fontSize:11}}> [{q.marks}M]</span>}
            </p>
            {q.image&&<img src={q.image} alt="q" style={{maxWidth:"100%",maxHeight:200,borderRadius:10,border:"1px solid var(--border)",marginBottom:10,display:"block"}}/>}
            {q.type==="mcq"&&(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {MCQ_OPTS.map((opt,oi)=>q.options[oi]&&(
                  <label key={opt} className={`mcq-option${answers[i]===opt?" selected":""}`}
                    style={{display:"flex",alignItems:"center",gap:12,
                      background:answers[i]===opt?"rgba(99,102,241,.18)":"var(--surface2)",
                      border:`2px solid ${answers[i]===opt?"#6366f1":"var(--border)"}`,
                      borderRadius:13,padding:"11px 16px",
                      boxShadow:answers[i]===opt?"0 4px 14px rgba(99,102,241,.22)":"none",
                    }}>
                    <div style={{
                      width:22,height:22,borderRadius:"50%",flexShrink:0,
                      border:`2px solid ${answers[i]===opt?"#6366f1":"var(--dim)"}`,
                      background:answers[i]===opt?"#6366f1":"transparent",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      transition:"all .2s var(--ease-spring)",
                    }}>
                      {answers[i]===opt&&<div style={{width:8,height:8,borderRadius:"50%",background:"#fff",animation:"checkPop .3s var(--ease-spring)"}}/>}
                    </div>
                    <input type="radio" name={`q${i}`} value={opt} checked={answers[i]===opt} onChange={()=>setAnswers(a=>({...a,[i]:opt}))} style={{display:"none"}}/>
                    <span style={{color:"var(--accent2)",fontWeight:800,minWidth:22,fontFamily:"'Space Grotesk',sans-serif"}}>{opt}</span>
                    <span style={{color:"var(--text)",fontSize:13,lineHeight:1.4}}>{q.options[oi]}</span>
                  </label>
                ))}
              </div>
            )}
            {q.type==="truefalse"&&(
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                {["True","False"].map(v=>(
                  <label key={v} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",
                    background:answers[i]===v?"var(--border)":"var(--surface2)",border:`2px solid ${answers[i]===v?"#6366f1":"var(--border)"}`,
                    borderRadius:11,padding:"10px 22px",fontWeight:answers[i]===v?700:400,transition:"all .15s"}}>
                    <input type="radio" name={`q${i}`} value={v} checked={answers[i]===v} onChange={()=>setAnswers(a=>({...a,[i]:v}))} style={{accentColor:"#6366f1"}}/>
                    <span style={{color:"var(--text)"}}>{v==="True"?"✅ True":"❌ False"}</span>
                  </label>
                ))}
              </div>
            )}
            {q.type==="subjective"&&(
              <textarea placeholder="Yahan apna jawab likhein…" value={answers[i]||""} onChange={e=>setAnswers(a=>({...a,[i]:e.target.value}))} style={{...inputS,minHeight:75,resize:"vertical"}}/>
            )}
          </div>
        ))}
        <button onClick={submit} disabled={submitting} className="btn-glow" style={{...btn("linear-gradient(135deg,#4f46e5,#7c3aed)"),marginTop:4,marginBottom:30,width:"100%",fontSize:15,padding:"16px",opacity:submitting?0.85:1,boxShadow:"0 8px 32px rgba(99,102,241,.4)",borderRadius:16,letterSpacing:.3,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700}}>
          {submitting?(
            <span className="dot-loading" style={{display:"inline-flex",alignItems:"center",gap:2}}>
              Submit ho raha hai <span/><span/><span/>
            </span>
          ):"📤 Submit DPP"}
        </button>
      </div>
    </div>
  );
}

// ── TEACHER PANEL ─────────────────────────────────────────────────────────
function TeacherPanel({onBack}){
  const [view,setView]=useState("list");
  const [tab,setTab]=useState("dpps"); // dpps | results
  const [editDpp,setEditDpp]=useState(null);
  const [detailId,setDetailId]=useState(null);
  const dpps=useDpps();
  const allSubs=useAllSubmissions();

  if(view==="create") return <DppForm initial={editDpp} onSave={async dpp=>{ await dbSaveDpp(dpp); setEditDpp(null); setView("list"); }} onCancel={()=>{setEditDpp(null);setView("list");}}/>;  
  if(view==="ai") return <AiDppGenerator onSave={async dpp=>{ await dbSaveDpp(dpp); setView("list"); }} onCancel={()=>setView("list")}/>;
  if(view==="detail"&&detailId){
    const dpp=dpps[detailId];
    if(!dpp) return null;
    return <DppDetail dpp={dpp} onBack={()=>{setDetailId(null);setView("list");}} onEdit={()=>{setEditDpp(dpp);setView("create");}} onDelete={async()=>{ await dbDeleteDpp(detailId); setDetailId(null); setView("list"); }}/>;
  }

  // All results: flatten
  const allResults=[];
  Object.entries(allSubs).forEach(([dppId,dppSubs])=>{
    const dpp=dpps[dppId];
    if(!dpp) return;
    Object.values(dppSubs).forEach(sub=>{
      const sc=calcScore(dpp,sub.answers);
      allResults.push({...sub,dppTitle:dpp.title,batch:dpp.batch,...sc});
    });
  });
  allResults.sort((a,b)=>b.submittedAt-a.submittedAt);

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f0c29,#302b63,#24243e)",padding:"20px 16px"}}>
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <div className="fade-up" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <button onClick={onBack} style={{background:"none",border:"none",color:"var(--accent2)",fontSize:13,cursor:"pointer",fontWeight:600,marginBottom:4,display:"block"}}>← Logout</button>
            <h2 style={{color:"#fff",fontSize:21,fontWeight:900}}>👨‍🏫 Teacher Panel</h2>
          </div>
          {tab==="dpps"&&<div style={{display:"flex",gap:8}}>
            <button onClick={()=>setView("ai")} style={{...btn("linear-gradient(135deg,#7c3aed,#a78bfa)",{padding:"11px 14px",fontSize:13})}}>🤖 AI DPP</button>
            <button onClick={()=>{setEditDpp(null);setView("create");}} style={{...btn("linear-gradient(135deg,#4f46e5,#7c3aed)",{padding:"11px 14px",fontSize:13})}}>+ New DPP</button>
          </div>}
        </div>

        {/* Stats Row */}
        <div className="fade-up" style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
          <StatBox label="Total DPPs" value={Object.keys(dpps).length} icon="📋"/>
          <StatBox label="Class 10" value={Object.values(dpps).filter(d=>d.batch==="class10").length} icon="📚"/>
          <StatBox label="Class 8" value={Object.values(dpps).filter(d=>d.batch==="class8").length} icon="📖"/>
          <StatBox label="Submissions" value={allResults.length} icon="📝"/>
        </div>

        {/* Tab Bar */}
        <div className="fade-up" style={{display:"flex",gap:6,marginBottom:18,background:"var(--surface)",borderRadius:16,padding:5,border:"1px solid var(--border)"}}>
          {[["dpps","📋 DPPs"],["results","📊 Sabka Result"]].map(([key,label])=>(
            <button key={key} onClick={()=>setTab(key)}
              style={{flex:1,padding:"10px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,
                background:tab===key?"linear-gradient(135deg,#4f46e5,#7c3aed)":"none",
                color:tab===key?"#fff":"var(--muted)",transition:"all .2s"}}>
              {label}
            </button>
          ))}
        </div>

        {/* DPPs Tab */}
        {tab==="dpps"&&(
          <div className="fade-up">
            {Object.keys(dpps).length===0
              ? <div style={{textAlign:"center",padding:"50px 0"}}>
                  <div style={{fontSize:50,marginBottom:8}}>📭</div>
                  <p style={{color:"var(--muted)"}}>Koi DPP nahi hai. "+ New DPP" dabao!</p>
                </div>
              : Object.values(dpps).map(d=>(
                <div key={d.id} onClick={()=>{setDetailId(d.id);setView("detail");}}
                  style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:"14px 16px",marginBottom:8,cursor:"pointer",
                    display:"flex",justifyContent:"space-between",alignItems:"center"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="#6366f1";e.currentTarget.style.background="var(--border)";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="var(--surface)";}}>
                  <div>
                    <p style={{fontWeight:800,color:"var(--text)",marginBottom:5}}>{d.title}</p>
                    <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                      <span style={{background:"var(--border)",color:"var(--accent2)",fontSize:11,fontWeight:700,padding:"2px 10px",borderRadius:20}}>{d.batch==="class10"?"Class 10":d.batch==="class8"?"Class 8":d.batch}</span>
                      <span style={{background:"var(--surface2)",color:"var(--muted)",fontSize:11,padding:"2px 10px",borderRadius:20}}>{d.questions.length} Qs</span>
                    </div>
                  </div>
                  <span style={{color:"var(--dim)",fontSize:18}}>›</span>
                </div>
              ))
            }
          </div>
        )}

        {/* All Results Tab */}
        {tab==="results"&&(
          <div className="fade-up">
            {allResults.length===0
              ? <div style={{textAlign:"center",padding:"50px 0"}}>
                  <div style={{fontSize:50,marginBottom:8}}>📭</div>
                  <p style={{color:"var(--muted)"}}>Abhi koi submission nahi hai.</p>
                </div>
              : allResults.map((r,i)=>(
                <div key={i} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:"14px 16px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div>
                      <p style={{fontWeight:800,color:"var(--text)",fontSize:14}}>{r.studentName}</p>
                      <p style={{color:"var(--muted)",fontSize:12,marginTop:2}}>{r.dppTitle}</p>
                      <span style={{background:"var(--border)",color:"var(--accent2)",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20}}>
                        {r.batch==="class10"?"Class 10":r.batch==="class8"?"Class 8":r.batch}
                      </span>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <p style={{fontWeight:900,color:"var(--accent2)",fontSize:18}}>{r.pct}%</p>
                      <p style={{color:"var(--dim)",fontSize:11}}>{r.got}/{r.total}M</p>
                    </div>
                  </div>
                  {/* Progress Bar */}
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{flex:1,height:6,background:"var(--border)",borderRadius:99,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${r.pct}%`,borderRadius:99,
                        background:r.pct>=80?"linear-gradient(90deg,#16a34a,#4ade80)":r.pct>=50?"linear-gradient(90deg,#d97706,#fbbf24)":"linear-gradient(90deg,#dc2626,#f87171)",
                        transition:"width 0.8s ease"}}/>
                    </div>
                    <span style={{color:"var(--dim)",fontSize:10,minWidth:32}}>{new Date(r.submittedAt).toLocaleDateString("en-IN")}</span>
                  </div>
                </div>
              ))
            }
          </div>
        )}
      </div>
    </div>
  );
}


// ── AI DPP GENERATOR ─────────────────────────────────────────────────────
function AiDppGenerator({onSave,onCancel}){
  const [topic,setTopic]=useState("");
  const [batch,setBatch]=useState("");
  const [qCount,setQCount]=useState("10");
  const [loading,setLoading]=useState(false);
  const [preview,setPreview]=useState(null);
  const [err,setErr]=useState("");

  async function generate(){
    if(!topic.trim()||!batch){setErr("Topic aur class dono zaruri hain!");return;}
    setErr("");setLoading(true);setPreview(null);
    try{
      const prompt=`You are a Maths teacher creating a DPP (Daily Practice Problem) for Indian school students.

Topic: ${topic}
Class: ${batch==="class10"?"Class 10":"Class 8"}
Number of questions: ${qCount}

Create exactly ${qCount} questions. Mix of MCQ (4 options), True/False, and Subjective types.
For MCQ: provide 4 options and correct answer as "A", "B", "C", or "D"
For True/False: answer as "True" or "False"
For Subjective: provide the correct answer/solution

Return ONLY a valid JSON array, no explanation, no markdown:
[
  {"text":"question text","type":"mcq","options":["opt1","opt2","opt3","opt4"],"answer":"A","marks":"1"},
  {"text":"question text","type":"truefalse","options":[],"answer":"True","marks":"1"},
  {"text":"question text","type":"subjective","options":[],"answer":"solution here","marks":"2"}
]`;

      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":AI_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4000,messages:[{role:"user",content:prompt}]})
      });
      const data=await res.json();
      if(data.error){setErr("API Error: "+data.error.message);setLoading(false);return;}
      const text=data.content[0].text;
      const clean=text.replace(/```json|```/g,"").trim();
      const questions=JSON.parse(clean);
      const dpp={
        id:"AI_"+uid(),
        title:topic+" – DPP (AI)",
        batch,
        questions:questions.map(q=>({...q,image:""}))
      };
      setPreview(dpp);
    }catch(e){setErr("Error: "+e.message);}
    setLoading(false);
  }

  if(preview) return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f0c29,#302b63,#24243e)",padding:"20px 16px"}}>
      <div style={{maxWidth:680,margin:"0 auto"}}>
        <div className="fade-up" style={{...card,marginBottom:14}}>
          <button onClick={()=>setPreview(null)} style={{background:"none",border:"none",color:"var(--accent2)",fontSize:13,cursor:"pointer",fontWeight:600,marginBottom:10,display:"block"}}>← Wapas Edit Karo</button>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <span style={{fontSize:28}}>🤖</span>
            <div>
              <h2 style={{color:"var(--text)",fontWeight:900,fontSize:18}}>{preview.title}</h2>
              <p style={{color:"var(--muted)",fontSize:12}}>{preview.batch==="class10"?"Class 10":"Class 8"} · {preview.questions.length} Questions</p>
            </div>
          </div>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(34,211,165,.1)",border:"1px solid rgba(34,211,165,.2)",borderRadius:99,padding:"4px 12px",marginTop:6}}>
            <span style={{fontSize:10}}>✨</span>
            <span style={{color:"var(--green)",fontSize:11,fontWeight:700}}>AI Generated</span>
          </div>
        </div>

        <div style={{...card,marginBottom:14}}>
          <p style={{color:"var(--accent2)",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Questions Preview</p>
          {preview.questions.map((q,i)=>(
            <div key={i} style={{border:"1px solid var(--border)",borderRadius:11,padding:"12px 14px",marginBottom:8,background:"var(--surface2)"}}>
              <p style={{fontWeight:700,color:"var(--text)",fontSize:13,marginBottom:6}}>
                <span style={{color:"var(--accent2)"}}>Q{i+1}.</span> {q.text}
                <span style={{color:"var(--dim)",fontWeight:400,fontSize:11}}> [{q.marks}M · {q.type}]</span>
              </p>
              {q.type==="mcq"&&q.options.map((o,oi)=>(
                <p key={oi} style={{fontSize:12,color:["A","B","C","D"][oi]===q.answer?"var(--green)":"var(--muted)",marginLeft:10,marginTop:2}}>
                  {["A","B","C","D"][oi]}. {o} {["A","B","C","D"][oi]===q.answer?"✅":""}
                </p>
              ))}
              {q.type==="truefalse"&&<p style={{fontSize:12,color:"var(--green)",marginLeft:10,marginTop:2}}>Ans: {q.answer} ✅</p>}
              {q.type==="subjective"&&<p style={{fontSize:12,color:"var(--accent2)",marginLeft:10,marginTop:2,fontStyle:"italic"}}>Ans: {q.answer}</p>}
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:10,marginBottom:28}}>
          <button onClick={()=>setPreview(null)} style={{...btn("var(--surface2)"),flex:1,border:"1px solid var(--border)"}}>🔄 Dobara Generate</button>
          <button onClick={()=>onSave(preview)} className="btn-glow" style={{...btn("linear-gradient(135deg,#16a34a,#15803d)"),flex:1,fontSize:15,padding:"14px"}}>💾 Firebase mein Save Karo</button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f0c29,#302b63,#24243e)",padding:"20px 16px"}}>
      <div style={{maxWidth:500,margin:"0 auto"}}>
        <div className="fade-up" style={{...card,marginBottom:14}}>
          <button onClick={onCancel} style={{background:"none",border:"none",color:"var(--accent2)",fontSize:13,cursor:"pointer",fontWeight:600,marginBottom:14,display:"block"}}>← Wapas</button>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
            <div style={{width:52,height:52,background:"linear-gradient(135deg,#7c3aed,#a78bfa)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>🤖</div>
            <div>
              <h2 style={{color:"var(--text)",fontWeight:900,fontSize:20}}>AI DPP Generator</h2>
              <p style={{color:"var(--muted)",fontSize:12,marginTop:2}}>Topic do, AI questions banayega!</p>
            </div>
          </div>

          <span style={labelS}>Topic / Chapter</span>
          <input placeholder="e.g. Quadratic Equations, Trigonometry..." value={topic} onChange={e=>setTopic(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&generate()} style={inputS}/>

          <span style={labelS}>Class</span>
          <select value={batch} onChange={e=>setBatch(e.target.value)} style={{...inputS,marginBottom:4}}>
            <option value="">-- Class Chunein --</option>
            <option value="class10">Class 10</option>
            <option value="class8">Class 8</option>
          </select>

          <span style={labelS}>Kitne Questions?</span>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            {["5","8","10","15"].map(n=>(
              <button key={n} onClick={()=>setQCount(n)}
                style={{flex:1,padding:"10px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:14,
                  background:qCount===n?"linear-gradient(135deg,#4f46e5,#7c3aed)":"var(--surface2)",
                  color:qCount===n?"#fff":"var(--muted)",transition:"all .2s"}}>
                {n}
              </button>
            ))}
          </div>

          {err&&<div style={{background:"rgba(248,113,113,.1)",border:"1px solid rgba(248,113,113,.3)",borderRadius:10,padding:"10px 14px",color:"var(--red)",fontSize:13,marginBottom:12}}>❌ {err}</div>}

          <button onClick={generate} disabled={loading} className="btn-glow" style={{...btn("linear-gradient(135deg,#7c3aed,#4f46e5)"),width:"100%",padding:"15px",fontSize:16,marginTop:10,opacity:loading?0.8:1,fontFamily:"'Space Grotesk',sans-serif"}}>
            {loading?(
              <span className="dot-loading" style={{display:"inline-flex",alignItems:"center",gap:4}}>
                AI soch raha hai <span/><span/><span/>
              </span>
            ):"✨ AI se DPP Banao"}
          </button>
        </div>
      </div>
    </div>
  );
}

    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f0c29,#302b63,#24243e)",padding:"20px 16px"}}>

              <span style={{background:"var(--border)",color:"var(--accent2)",fontSize:11,fontWeight:700,padding:"3px 12px",borderRadius:20}}>{dpp.batch==="class10"?"Class 10":"Class 8"}</span>
              <span style={{marginLeft:6,background:"var(--surface2)",color:"var(--muted)",fontSize:11,padding:"3px 12px",borderRadius:20}}>{dpp.questions.length} Qs</span>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={onEdit} style={{...btn("#0891b2",{padding:"8px 14px",fontSize:12})}}>✏️ Edit</button>
              <button onClick={()=>{if(window.confirm("Delete karein?")) onDelete();}} style={{...btn("#ef4444",{padding:"8px 14px",fontSize:12})}}>🗑 Delete</button>
            </div>
          </div>
          {avgPct!==null&&(
            <div style={{marginTop:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{color:"var(--muted)",fontSize:12,fontWeight:600}}>Class Average</span>
                <span style={{color:"var(--accent2)",fontWeight:700,fontSize:12}}>{avgPct}%</span>
              </div>
              <div style={{height:8,background:"var(--border)",borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${avgPct}%`,background:"linear-gradient(90deg,#4f46e5,#a78bfa)",borderRadius:99}}/>
              </div>
            </div>
          )}

        <div className="fade-up" style={{...card,marginBottom:12}}>
          <p style={{color:"var(--accent2)",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Questions ({dpp.questions.length})</p>
          {dpp.questions.map((q,i)=>(
            <div key={i} style={{border:"1px solid var(--border)",borderRadius:11,padding:"10px 13px",marginBottom:7,background:"var(--surface2)"}}>
              <p style={{fontWeight:700,color:"var(--text)",fontSize:13}}>Q{i+1}. {q.text} <span style={{color:"var(--dim)",fontWeight:400}}>({q.type}, {q.marks||1}M)</span></p>
              {q.image&&<img src={q.image} alt="q" style={{maxWidth:"100%",maxHeight:140,borderRadius:8,marginTop:5,display:"block"}}/>}
              {q.type==="mcq"&&q.options.filter(Boolean).map((o,oi)=>(
                <p key={oi} style={{fontSize:12,color:MCQ_OPTS[oi]===q.answer?"var(--green)":"var(--muted)",marginTop:3,marginLeft:10}}>
                  {MCQ_OPTS[oi]===q.answer?"✅ ":""}{MCQ_OPTS[oi]}) {o}
                </p>
              ))}
              {q.type==="truefalse"&&<p style={{fontSize:12,color:"var(--green)",marginTop:3,marginLeft:10}}>✅ {q.answer}</p>}
            </div>
          ))}
        </div>

        <div className="fade-up" style={{...card}}>
          <p style={{color:"var(--accent2)",fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Submissions ({subList.length})</p>
          {subList.length===0
            ? <p style={{color:"var(--dim)",fontSize:13,textAlign:"center",padding:"18px 0"}}>Abhi kisi ne submit nahi kiya.</p>
            : subList.sort((a,b)=>calcScore(dpp,b.answers).pct-calcScore(dpp,a.answers).pct).map(s=>{
              const sc=calcScore(dpp,s.answers);
              return <SubmissionCard key={s.id} sub={s} dpp={dpp} sc={sc}/>;
            })
          }
        </div>
      </div>
    </div>
  );
}

// ── DPP FORM ──────────────────────────────────────────────────────────────
function DppForm({initial,onSave,onCancel}){
  const isEdit=!!initial;
  const [dpp,setDpp]=useState(initial||{...emptyDpp(),id:uid()});
  const [saving,setSaving]=useState(false);
  function setField(f,v){ setDpp(d=>({...d,[f]:v})); }
  function addQ(){ setDpp(d=>({...d,questions:[...d.questions,emptyQ()]})); }
  function removeQ(i){ setDpp(d=>({...d,questions:d.questions.filter((_,j)=>j!==i)})); }
  function updateQ(i,patch){ setDpp(d=>({...d,questions:d.questions.map((q,j)=>j===i?{...q,...patch}:q)})); }
  async function save(){
    if(!dpp.title.trim()){alert("Title likhein!");return;}
    if(!dpp.batch){alert("Class chunein!");return;}
    if(dpp.questions.length===0){alert("Kam se kam 1 question add karein!");return;}
    setSaving(true); await onSave(dpp); setSaving(false);
  }
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f0c29,#302b63,#24243e)",padding:"20px 16px"}}>
      <div style={{maxWidth:680,margin:"0 auto"}}>
        <div className="fade-up" style={{...card,marginBottom:12}}>
          <button onClick={onCancel} style={{background:"none",border:"none",color:"var(--accent2)",fontSize:13,cursor:"pointer",fontWeight:600,marginBottom:12,display:"block"}}>← Back</button>
          <h2 style={{fontSize:19,fontWeight:900,color:"var(--text)",marginBottom:18}}>{isEdit?"✏️ Edit DPP":"➕ New DPP"}</h2>
          <span style={labelS}>DPP Title</span>
          <input placeholder="e.g. Quadratic Equations – DPP 3" value={dpp.title} onChange={e=>setField("title",e.target.value)} style={inputS}/>
          <span style={labelS}>Class</span>
          <select value={dpp.batch} onChange={e=>setField("batch",e.target.value)} style={inputS}>
            <option value="">-- Class Chunein --</option>
            <option value="class10">Class 10</option>
            <option value="class8">Class 8</option>
          </select>
        </div>
        <div className="fade-up" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <h3 style={{color:"var(--text)",fontWeight:800}}>Questions ({dpp.questions.length})</h3>
          <button onClick={addQ} style={{...btn("linear-gradient(135deg,#4f46e5,#7c3aed)",{padding:"8px 16px"})}}>+ Add Q</button>
        </div>
        {dpp.questions.length===0&&(
          <div style={{textAlign:"center",padding:"28px",color:"var(--dim)",background:"var(--surface)",borderRadius:14,border:"1.5px dashed #312e81",marginBottom:12}}>
            <p style={{fontSize:30,marginBottom:6}}>📝</p>
            <p style={{color:"var(--muted)"}}>+ Add Q dabao</p>
          </div>
        )}
        {dpp.questions.map((q,i)=>(
          <QuestionEditor key={i} q={q} index={i} onChange={patch=>updateQ(i,patch)} onRemove={()=>removeQ(i)}/>
        ))}
        <button onClick={save} disabled={saving} style={{...btn("linear-gradient(135deg,#16a34a,#15803d)"),marginTop:6,marginBottom:30,width:"100%",padding:"14px",fontSize:15,opacity:saving?0.7:1}}>
          {saving?"⏳ Save ho raha hai...":"💾 Save DPP"}
        </button>
      </div>
    </div>
  );
}

          </div>
        )}
      </div>
      <span style={labelS}>Type</span>
      <select value={q.type} onChange={e=>onChange({type:e.target.value,options:emptyOpts(),answer:""})} style={inputS}>
        <option value="mcq">MCQ</option>

          ))}
          <div style={{marginTop:7,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:12,fontWeight:700,color:"var(--muted)"}}>Correct:</span>
            {MCQ_OPTS.map(v=>(
              <label key={v} style={{cursor:"pointer",fontWeight:q.answer===v?800:400,color:q.answer===v?"var(--accent2)":"var(--muted)",display:"flex",alignItems:"center",gap:3,fontSize:13}}>
                <input type="radio" name={`ans${index}`} value={v} checked={q.answer===v} onChange={()=>onChange({answer:v})} style={{accentColor:"#6366f1"}}/>{v}
              </label>
            ))}
          </div>
        </div>
      )}
      {q.type==="truefalse"&&(
        <div style={{marginTop:7,display:"flex",gap:14,alignItems:"center"}}>
          <span style={{fontSize:12,fontWeight:700,color:"var(--muted)"}}>Correct:</span>
          {["True","False"].map(v=>(
            <label key={v} style={{cursor:"pointer",fontWeight:q.answer===v?800:400,color:q.answer===v?"var(--accent2)":"var(--muted)",display:"flex",alignItems:"center",gap:3,fontSize:13}}>
              <input type="radio" name={`tf${index}`} value={v} checked={q.answer===v} onChange={()=>onChange({answer:v})} style={{accentColor:"#6366f1"}}/>{v}

          ))}

      </div>
    </div>
  );

            );

        </div>
      )}
    </div>
  );
}
